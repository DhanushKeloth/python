<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f0f2f5;
    }

    .container {
      display: flex;
      height: 100vh;
    }

    /* Sidebar */
    .sidebar {
      width: 250px;
      background: #1e293b;
      color: white;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .sidebar input,
    .sidebar select,
    .sidebar button {
      padding: 10px;
      border: none;
      border-radius: 6px;
      outline: none;
    }

    .sidebar button {
      background: #3b82f6;
      color: white;
      cursor: pointer;
    }

    .sidebar button:hover {
      background: #2563eb;
    }

    /* Chat Area */
    .chat {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: #e5e7eb;
    }

    .messages {
      flex: 1;
      padding: 20px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    /* Chat bubbles */
    .message {
      max-width: 60%;
      padding: 10px;
      border-radius: 10px;
      background: white;
    }

    .dm {
      background: #ede9fe;
      align-self: flex-end;
    }

    .typing {
      padding: 5px 20px;
      font-size: 14px;
      color: gray;
    }

    .input-area {
      display: flex;
      padding: 10px;
      background: white;
      gap: 10px;
    }

    .input-area input {
      flex: 1;
      padding: 10px;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

    .input-area button {
      padding: 10px 20px;
      background: #3b82f6;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    .input-area button:hover {
      background: #2563eb;
    }
  </style>
  </head>
  <body>
<body>
  <div class="container">
    <!-- Sidebar -->
    <div class="sidebar">
      <h3>Chat App</h3>
      <input type="text" id="name" placeholder="Username" />
      <input type="text" id="room" placeholder="Room" />
      <button onclick="join()">Join</button>

      <select id="mode">
        <option value="room">Room Chat</option>
        <option value="dm">Private Chat</option>
      </select>

      <select id="users"></select>
    </div>

    <!-- Chat Area -->
    <div class="chat">
      <div id="text-box" class="messages"></div>
      <div id="typing" class="typing"></div>

      <div class="input-area">
        <input type="text" id="msg" placeholder="Type a message..." oninput="handleTyping()" />
        <button onclick="send()">Send</button>
      </div>
    </div>
  </div>

    <script>
      let ws;
      let textBox = document.getElementById("text-box");
      const name = document.getElementById("name");
      const room = document.getElementById("room");

      function join() {
        ws = new WebSocket("ws://localhost:8000/ws");

        ws.onopen = () => {
          ws.send(
            JSON.stringify({
              type: "join",
              name: name.value,
              room: room.value,
            }),
          );
        }; //onopen

        ws.onmessage = (event) => {
          let res = JSON.parse(event.data);
          //   console.log(res)
          if (res.type == "users") {
            const dropdown = document.getElementById("users");
            dropdown.innerHTML = "";
            res.users.forEach((user) => {
              const option = document.createElement("option");

              option.value = user.name;

              const icon = user.status === "online" ? "🟢" : "🔴";
              option.textContent = `${icon} ${user.name}`;

              dropdown.appendChild(option);
            });
          } else if (res.type == "message") {
            let div = document.createElement("div");
            div.classList.add("message");
            div.textContent = `${res.name}: ${res.message}`;
            textBox.appendChild(div);
          } else if (res.type === "dm") {
            let div = document.createElement("div");
            div.classList.add("message", "dm");
            div.textContent = `[DM] ${res.from}: ${res.message}`;
            textBox.appendChild(div);
          }
          else if (res.type=="typing"){
            const typingdiv = document.getElementById("typing")
            if(res.status=="start"){
              typingdiv.textContent = `${res.name} is typing...`
            }else{
              typingdiv.textContent = ""
            }
          }
        };
      }

      function send() {
        const msg = document.getElementById("msg");
        const mode = document.getElementById("mode").value;
        if (mode == "room") {
          ws.send(
            JSON.stringify({
              type: "message",
              message: msg.value,
            }),
          );
          msg.value = "";
        } else {
          const to = document.getElementById("users").value;
          ws.send(
            JSON.stringify({
              type: "dm",
              to: to,
              message: msg.value,
            }),
          );
          msg.value = "";
        }
      } /*send function */
      function handleTyping() {
        let timeout;
        ws.send(
          JSON.stringify({
            type:"typing",
            status:"start",
          })
        )
        clearTimeout(timeout)
        timeout=setTimeout(()=>{
          ws.send(
            JSON.stringify({
              type:"typing",
              status:"stop",
            })
          )
        },1000)
      }

    </script>
  </body>
</html>
